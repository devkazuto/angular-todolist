<form [formGroup]="todosForm" (ngSubmit)="handleCreateNewTodo()">
    <section class="todo_form_card">
        <h1 class="todo_form_title">Tambah Tugas</h1>

        <mat-form-field color="accent" appearance="outline" class="todo_form_input">
            <mat-label>Judul</mat-label>
            <input matInput formControlName="title" placeholder="Masukkan judul" />
        </mat-form-field>

        <mat-form-field color="accent" appearance="outline" class="todo_form_input">
            <mat-label>Deskripsi</mat-label>
            <textarea matInput formControlName="description" placeholder="Masukkan deskripsi"></textarea>
        </mat-form-field>

        <div class="todo_form_actions">
            <button mat-raised-button class="todo_form_sucess_btn" type="submit">
                Tambah
            </button>
            <button mat-raised-button color="warn" type="button" (click)="handleCloseModal()">Batal</button>
        </div>
    </section>
</form>
